title: VMI Ventilairsec
views:
  - title: Ventilation
    path: vmi
    icon: mdi:fan
    cards:
      - type: entities
        title: État principal
        entities:
          - sensor.vmi_temperature
          - sensor.vmi_humidity
          - sensor.vmi_co2
          - select.vmi_mode
          - number.vmi_setpoint

      - type: gauge
        title: Température
        entity: sensor.vmi_temperature
        min: 10
        max: 35
        severity:
          green: 18
          yellow: 24
          red: 30

      - type: gauge
        title: Humidité
        entity: sensor.vmi_humidity
        min: 0
        max: 100
        severity:
          green: 40
          yellow: 60
          red: 80

      - type: statistics-graph
        title: Historique température
        entities:
          - sensor.vmi_temperature
        period: day
        stat_types:
          - mean
